name: Extract MongoDB test cases

on:
  schedule:
    - cron: "0 6 * * 3,6" # 06:00 wed,sat
  workflow_dispatch:

jobs:
  extract:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - run: npm ci

      - name: Sparse checkout MongoDB jstests
        run: |
          git clone --filter=blob:none --sparse --depth=1 \
            https://github.com/mongodb/mongo.git mongo
          git -C mongo sparse-checkout set jstests/core/query

      - name: Collect
        run: npx tsx src/collect.ts mongo/jstests/core/query --output=results.ndjson

      - name: Interpret
        run: npx tsx src/interpret.ts results.ndjson test-cases.ndjson

      - name: Compute checksum
        run: sha256sum test-cases.ndjson | awk '{print $1}' > checksum.sha256

      - name: Check if output changed
        id: changed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p /tmp/prev
          if gh release download --pattern 'checksum.sha256' --dir /tmp/prev 2>/dev/null; then
            if cmp -s checksum.sha256 /tmp/prev/checksum.sha256; then
              echo "result=false" >> $GITHUB_OUTPUT
            else
              echo "result=true" >> $GITHUB_OUTPUT
            fi
          else
            echo "result=true" >> $GITHUB_OUTPUT
          fi

      - name: Publish
        if: steps.changed.outputs.result == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="extraction-$(date +%Y-%m-%dT%H:%M)"
          gh release create "$TAG" test-cases.ndjson checksum.sha256 \
            --title "Extraction $TAG" \
            --notes "Extracted from mongodb/mongo jstests/core/query"
